<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#E0E0E0;display:flex;justify-content:center;align-items:center;min-height:100vh}
@keyframes zB{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes zJ{0%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes cur{0%,100%{opacity:1}50%{opacity:0}}
@keyframes glow{0%,100%{box-shadow:0 0 15px rgba(42,157,143,0.2)}50%{box-shadow:0 0 35px rgba(42,157,143,0.5)}}
.phone{width:393px;height:852px;border-radius:55px;border:4px solid #1a1a1a;position:relative;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.3);display:flex;flex-direction:column;background:linear-gradient(170deg,#E8F5E9 0%,#B2EBF2 35%,#E3F2FD 65%,#F3E5F5 100%)}
.island{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:126px;height:37px;border-radius:20px;background:#000;z-index:50}
.sbar{position:absolute;top:14px;left:32px;right:32px;display:flex;justify-content:space-between;z-index:40;font-size:13px;font-weight:600;color:#444}
.cnt{flex:1;margin-top:56px;overflow-y:auto;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:justify-content 0.3s}
.cnt.hc{justify-content:flex-start;padding-top:12px}
.aw{position:relative;display:inline-block;margin-bottom:6px;flex-shrink:0}
.ag{position:absolute;inset:-8px;border-radius:50%;opacity:0.2;filter:blur(12px);transition:all 0.5s}
.av{width:130px;height:130px;border-radius:50%;overflow:hidden;box-shadow:0 8px 32px rgba(42,157,143,0.35);border:4px solid rgba(42,157,143,0.4);transition:all 0.5s}
.av.speaking{animation:zB 1.8s ease-in-out infinite;border-color:rgba(76,175,80,0.6)}
.av.happy{animation:zJ 0.5s ease;border-color:rgba(255,179,0,0.6)}
.av.concerned{border-color:rgba(255,112,67,0.6)}
.av.idle{animation:zB 3s ease-in-out infinite}
.av img{width:100%;height:100%;object-fit:cover}
.dt{position:absolute;bottom:6px;right:6px;width:16px;height:16px;border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.25);transition:background 0.3s}
.sb{background:rgba(42,157,143,0.07);border-radius:16px;padding:10px 16px;margin:0 18px 10px;max-width:92%;border-left:3px solid #2A9D8F;min-height:36px}
.st{font-size:14px;color:#333;line-height:1.6}
.tc{display:inline-block;width:2px;height:15px;background:#2A9D8F;margin-left:2px;animation:cur 0.7s infinite;vertical-align:text-bottom}
.nc{animation:fadeIn 0.4s ease-out;background:rgba(255,255,255,0.94);border-radius:18px;padding:12px 16px;margin:4px 16px;box-shadow:0 4px 20px rgba(0,0,0,0.06);display:flex;align-items:center;gap:12px}
.ni{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.sp{flex-grow:1}
.ib{flex-shrink:0;padding:8px 14px 4px;display:flex;gap:8px;align-items:center;width:100%}
.ib input{flex:1;height:44px;border-radius:22px;border:2px solid rgba(42,157,143,0.3);padding:0 18px;font-size:16px;font-family:'Nunito',sans-serif;background:rgba(255,255,255,0.95);outline:none;color:#333}
.ib input:focus{border-color:#2A9D8F;box-shadow:0 0 0 3px rgba(42,157,143,0.1)}
.sn{width:44px;height:44px;border-radius:50%;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:none;transition:all 0.2s;font-size:16px;-webkit-tap-highlight-color:transparent}
.bn{flex-shrink:0;height:64px;background:rgba(250,250,248,0.97);border-top:1px solid rgba(0,0,0,0.06);display:flex;justify-content:space-around;align-items:flex-start;padding-top:8px}
.bn>div{text-align:center;cursor:pointer;padding:2px 18px}
.hb{flex-shrink:0;height:8px;display:flex;justify-content:center;align-items:center;background:rgba(250,250,248,0.97)}
.hb div{width:134px;height:5px;border-radius:3px;background:rgba(0,0,0,0.12)}

var PROXY = "https://ulife-voice-proxy.vercel.app/api/tts";
var cAudio = null;

function uClock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
uClock();setInterval(uClock,30000);
document.getElementById('dinfo').textContent=new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'})+' · A-101';

var h=new Date().getHours();
var S={name:"Papa",bp:"128/80",bpOk:true,spo2:"97%",hr:"72",sugar:"118",health:87,
  mT:h>=9?1:0,mN:3,mS:30,
  nM:h<9?"Morning 08:00 AM":h<15?"Afternoon 02:00 PM":h<21?"Night 09:00 PM":"All done",

function sM(m){
  var el=document.getElementById('av');
  var gw=document.getElementById('glow');
  var dt=document.getElementById('dot');
  var cs={idle:"#2A9D8F",speaking:"#4CAF50",happy:"#FFB300",concerned:"#FF7043"};
  el.className='av '+m;
  gw.style.background=cs[m]||cs.idle;
  dt.style.background=cs[m]||cs.idle;
}

// Ritu TTS via Vercel proxy → Sarvam API
async function spkR(text,onPlay){
  if(cAudio){try{cAudio.pause();cAudio=null;}catch(e){}}

  // Vercel proxy (CORS-safe)
  try{
    var r=await fetch(PROXY,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({text:text})
    });
    if(r.ok){
      var d=await r.json();
      if(d.audios&&d.audios[0]){
        var au=new Audio("data:audio/wav;base64,"+d.audios[0]);
        cAudio=au;
        return new Promise(function(ok){
          au.onplay=function(){if(onPlay){onPlay();onPlay=null;}};
          au.onended=function(){cAudio=null;ok();};
          au.onerror=function(){cAudio=null;if(onPlay){onPlay();onPlay=null;}ok();};
          au.play().catch(function(){if(onPlay){onPlay();onPlay=null;}ok();});
        });
      }
    }
  }catch(e){console.log("Proxy TTS failed:",e);}

  // Fallback: browser TTS — trigger onPlay immediately
  if(onPlay){onPlay();onPlay=null;}
  return spkB(text);
}

function spkB(text){
  return new Promise(function(ok){
    if(!window.speechSynthesis){ok();return;}
    window.speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(text);
    var vs=window.speechSynthesis.getVoices();
    var v=vs.find(function(v){return v.name.indexOf('Samantha')>=0||v.name.indexOf('Karen')>=0;})
      ||vs.find(function(v){return v.lang.indexOf('en-IN')>=0;})
      ||vs.find(function(v){return v.lang.indexOf('en')>=0;})||vs[0];
    if(v)u.voice=v;
    u.rate=0.9;u.pitch=1.05;u.volume=1.0;
    u.onend=ok;u.onerror=ok;
    setTimeout(ok,Math.max(text.length*85,2500)+1000);
    window.speechSynthesis.speak(u);
  });
}

// Typewriter
var twT=null;
function tw(text){
  return new Promise(function(ok){
    clearTimeout(twT);
    var el=document.getElementById('sTxt');
    var bub=document.getElementById('sBub');
    var cnt=document.getElementById('cnt');
    bub.style.display='block';cnt.classList.add('hc');
    var i=0;el.innerHTML='';
    function tk(){if(i<text.length){i++;el.innerHTML=text.substring(0,i)+'<span class="tc"></span>';twT=setTimeout(tk,22);}else{el.innerHTML=text;ok();}}
    twT=setTimeout(tk,80);
  });
}

function sC(c){
  if(!c){document.getElementById('cArea').innerHTML='';return;}
  var bar='';
  if(c.bar){var p=Math.min(Math.round(c.bar[0]/c.bar[1]*100),100);bar='<div style="height:4px;background:rgba(0,0,0,0.06);border-radius:2px;margin-top:4px;overflow:hidden"><div style="height:100%;width:'+p+'%;background:'+(c.color||'#2A9D8F')+';border-radius:2px"></div></div>';}
  document.getElementById('cArea').innerHTML='<div class="nc"><div class="ni" style="background:'+(c.color||'#2A9D8F')+'15">'+c.icon+'</div><div style="flex:1"><div style="font-size:9px;color:#aaa;font-weight:700;text-transform:uppercase;letter-spacing:0.5px">'+c.label+'</div><div style="font-size:14px;font-weight:800;color:#1A1A2E;margin-top:1px">'+c.value+'</div>'+(c.sub?'<div style="font-size:10px;color:'+(c.color||'#888')+';margin-top:1px">'+c.sub+'</div>':'')+bar+'</div></div>';
}

var Q=[],bsy=false;
async function pQ(){
  if(bsy||Q.length===0){if(Q.length===0)setTimeout(function(){sM('idle');},300);return;}
  bsy=true;var it=Q.shift();sM(it.zm||'speaking');
  // Fetch voice first, then show card+text when audio starts playing
  var audioReady=false;
  var audioObj=null;

  // Start fetching voice immediately
  var voicePromise=spkR(it.text,function(){
    // onPlay callback — audio has started, NOW show card and text
    sC(it.card||null);
    tw(it.text);
  });

  // Timeout: if voice doesn't start within 3s, show card+text anyway
  var fallbackTimer=setTimeout(function(){
    if(!audioReady){
      audioReady=true;
      sC(it.card||null);
      tw(it.text);
    }
  },3000);

  // Wait for voice to finish
  voicePromise.then(function(){
    clearTimeout(fallbackTimer);
    // Wait for typewriter to likely finish, then move on
    setTimeout(function(){sC(null);bsy=false;pQ();},800);
  }).catch(function(){
    clearTimeout(fallbackTimer);
    setTimeout(function(){sC(null);bsy=false;pQ();},800);
  });

  // Voice timeout — max 15 seconds per item
  setTimeout(function(){if(bsy){sC(null);bsy=false;pQ();}},15000);
}
function nr(items){items.forEach(function(i){Q.push(i);});if(!bsy)pQ();}
function intr(){Q=[];bsy=false;if(cAudio){try{cAudio.pause();cAudio=null;}catch(e){}}try{window.speechSynthesis.cancel();}catch(e){}clearTimeout(twT);sC(null);sM('idle');}

function startN(){
  var g=ctx==='morning'?'Good morning ':ctx==='afternoon'?'Good afternoon ':ctx==='evening'?'Good evening ':'Good night ';
  var it=[];
  it.push({text:g+"Papa. How are you doing today? Let me check on everything for you.",zm:"speaking"});
  it.push({text:"Papa, your blood pressure is "+S.bp+". "+(S.bpOk?"Perfectly normal, nothing to worry about.":"It's a little high today. Please have some water and rest.")+" Oxygen is "+S.spo2+" and pulse is "+S.hr+" beats per minute.",card:{icon:"❤️",label:"Health",value:"BP "+S.bp+" · SpO₂ "+S.spo2,sub:"Score "+S.health+" · Pulse "+S.hr,color:"#E53935"}});
  it.push({text:S.mT+" of "+S.mN+" medicines done today. "+(S.nMn?"Papa, please don't forget your "+S.nMn+". It's important.":"All medicines taken! "+S.mS+" days in a row. I'm so proud of you, Papa."),zm:S.nMn?"speaking":"happy",card:{icon:"💊",label:"Medications",value:S.nMn?"Next: "+S.nM:"All done ✓",sub:S.mT+"/"+S.mN+" · "+S.mS+" day streak",color:"#2A9D8F"}});
  it.push({text:"You've walked "+S.st.toLocaleString()+" steps today. That's "+Math.round(S.st/S.sg*100)+" percent of your goal. "+(S.st>=S.sg*0.7?"Very good, Papa!":"How about a nice walk in the garden? The weather is lovely."),card:{icon:"🚶",label:"Steps",value:S.st.toLocaleString()+"/"+S.sg.toLocaleString(),color:"#43A047",bar:[S.st,S.sg]}});
  it.push({text:"You've had "+S.w+" of "+S.wg+" glasses of water. "+(S.w<5?"Papa, please drink some more water today.":"Good, keep it up!"),card:{icon:"💧",label:"Hydration",value:S.w+"/"+S.wg+" glasses",color:"#1E88E5",bar:[S.w,S.wg]}});
  if(S.fu>0)it.push({text:S.ff+" sent you a message, Papa. "+S.fm,card:{icon:"👨‍👩‍👧",label:"Family",value:S.fu+" messages from "+S.ff,color:"#AD1457"}});
  it.push({text:"That's everything for now, Papa. I'm always looking after you. Just type below if you need anything.",zm:"idle"});
  nr(it);
}

function hCmd(cmd){
  var c=cmd.toLowerCase();intr();
  setTimeout(function(){
    if(c.match(/bp|blood|health|vital/))nr([{text:"Papa, your blood pressure is "+S.bp+". Health score is "+S.health+". Oxygen "+S.spo2+". Everything looks good.",card:{icon:"❤️",label:"Health",value:"BP "+S.bp,sub:"Score "+S.health,color:"#E53935"}}]);
    else if(c.match(/sleep/))nr([{text:"You slept well last night, Papa. Sleep score is "+S.ss+". You got "+S.sd+" of rest. That's good for you.",card:{icon:"😴",label:"Sleep",value:"Score "+S.ss,sub:S.sd,color:"#5E35B1"}}]);
    else if(c.match(/take.*(med|pill)/))nr([{text:"Well done, Papa! Medicine taken. I'm keeping track for you.",zm:"happy",card:{icon:"💊",label:"Medications",value:"Taken ✓",color:"#4CAF50"}}]);
    else if(c.match(/med|medicine/))nr([{text:S.nMn?"Papa, your next medicine is "+S.nMn+". It's due at "+S.nM+". I'll remind you.":"All medicines done for today, Papa! You're so disciplined.",card:{icon:"💊",label:"Meds",value:S.nMn?S.nM:"All done ✓",color:"#2A9D8F"}}]);
    else if(c.match(/step|walk/))nr([{text:S.st.toLocaleString()+" steps, Papa. "+Math.round(S.st/S.sg*100)+" percent of your goal. "+(S.st>=S.sg*0.7?"Almost there! Keep going!":"A short walk would be nice. The garden looks beautiful today."),card:{icon:"🚶",label:"Steps",value:S.st.toLocaleString()+"/"+S.sg.toLocaleString(),color:"#43A047",bar:[S.st,S.sg]}}]);
    else if(c.match(/water|drink/))nr([{text:"Papa, you've had "+S.w+" of "+S.wg+" glasses. "+(S.w<5?"Please have some more water. It's important.":"Good hydration! Keep it up."),card:{icon:"💧",label:"Water",value:S.w+"/"+S.wg,color:"#1E88E5",bar:[S.w,S.wg]}}]);
    else if(c.match(/family|priya|anand/))nr([{text:S.ff+" sent a message, Papa. "+S.fm,card:{icon:"👨‍👩‍👧",label:"Family",value:S.fu+" messages",color:"#AD1457"}}]);
    else if(c.match(/music|raaga|play/))nr([{text:"Here's Mohanam for you, Papa. Sit back and relax.",zm:"happy",card:{icon:"🎵",label:"Music",value:"Mohanam",color:"#7B1FA2"}}]);
    else if(c.match(/low|sad|difficult/))nr([{text:"Papa, don't worry. I'm here. Should I play some music for you? Or would you like me to call? A walk in the garden might help too.",zm:"concerned",card:{icon:"😔",label:"Mood",value:"Feeling low",sub:"Music · Call · Garden walk",color:"#FF9800"}}]);
    else if(c.match(/great|good|fine|happy|okay/))nr([{text:"That makes me so happy, Papa! You keep smiling. It's a beautiful day.",zm:"happy",card:{icon:"😊",label:"Mood",value:"Feeling good",color:"#4CAF50"}}]);
    else if(c.match(/weather|temp/))nr([{text:"Papa, it's "+S.wt.t+" degrees outside. "+S.wt.c+" skies. "+(S.wt.t>33?"Stay cool and drink water.":"Nice weather for a walk."),card:{icon:"☀️",label:"Weather",value:S.wt.t+"°C",sub:S.wt.c,color:"#1E88E5"}}]);
    else if(c.match(/meal|lunch|breakfast|dinner/))nr([{text:"Good, Papa! Eating on time is important. Hope you enjoyed it.",zm:"happy",card:{icon:"🍽️",label:"Meals",value:"Logged",color:"#FF8F00"}}]);
    else nr([{text:"Papa, just ask me anything. About your health, medicines, sleep, family, steps, water, or how you're feeling."}]);
  },100);
}

var tIn,sBtn;
window.addEventListener('DOMContentLoaded',function(){
  tIn=document.getElementById('tIn');sBtn=document.getElementById('sBtn');
  tIn.addEventListener('input',function(){sBtn.style.background=tIn.value.trim()?'linear-gradient(135deg,#2A9D8F,#1A7A6E)':'rgba(42,157,143,0.15)';sBtn.style.color=tIn.value.trim()?'white':'#2A9D8F';});
  tIn.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();hSend();}});
  tIn.addEventListener('focus',function(){if(bsy&&Q.length>0)intr();});
  // Load voices for fallback
  if(window.speechSynthesis)window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};
  setTimeout(startN,200);
});
function hSend(){var v=tIn.value.trim();if(v){hCmd(v);tIn.value='';sBtn.style.background='rgba(42,157,143,0.15)';sBtn.style.color='#2A9D8F';tIn.blur();}}
function sTab(t){
  // Full reset
  intr();
  document.getElementById('sBub').style.display='none';
  document.getElementById('sTxt').innerHTML='';
  document.getElementById('cArea').innerHTML='';
  document.getElementById('cnt').classList.remove('hc');
  sM('idle');
  Q=[];bsy=false;

  if(t==='priya'){
    setTimeout(startN,600);
  } else if(t==='day'){
    setTimeout(function(){nr([{text:"Papa, My Day view is available in the full app. For now, ask me anything here.",zm:"speaking"}]);},400);
  } else if(t==='mod'){
    setTimeout(function(){nr([{text:"Papa, all 13 modules are available in the full app. I can tell you about any of them right here.",zm:"speaking"}]);},400);
  }
}
</script>
